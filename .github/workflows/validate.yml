name: Workspace Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Workspace Structure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          required_files=(
            "CLAUDE.md"
            "AGENTS.md"
            ".gitignore"
            ".gitattributes"
            "projects/registry.json"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Required file missing: $f"
              exit 1
            fi
          done
          echo "All required files present."

      - name: Validate registry.json
        run: |
          if ! python3 -c "import json; json.load(open('projects/registry.json'))" 2>/dev/null; then
            echo "ERROR: projects/registry.json is not valid JSON"
            exit 1
          fi
          echo "registry.json is valid JSON."

      - name: Check scripts are executable
        run: |
          for script in scripts/*.sh; do
            if [ ! -x "$script" ]; then
              echo "WARNING: $script is not executable"
            fi
          done

      - name: Validate hook files
        run: |
          for hook in .claude/hooks/*.js; do
            node --check "$hook" && echo "OK: $hook" || { echo "ERROR: $hook has syntax errors"; exit 1; }
          done

      - name: Check CLAUDE.md is not empty
        run: |
          if [ ! -s "CLAUDE.md" ]; then
            echo "ERROR: CLAUDE.md is empty"
            exit 1
          fi
          echo "CLAUDE.md looks good ($(wc -l < CLAUDE.md) lines)."
